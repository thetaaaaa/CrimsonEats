name: Update Harvard Food Events

on:
  schedule:
    # Run every day at 13:00 UTC (9:00 AM ET / 8:00 AM EDT)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write  # Needed to push food-events.html back to the repo

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Run scraper
        run: |
          python harvard_food_events.py

      - name: Generate calendar (ICS file)
        run: |
          python generate_calendar.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md events.ics events.geojson
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to files — skipping commit."
          else
            git commit -m $'chore: update food events, calendar, and map [skip ci]\n\nCo-Authored-By: Copilot <223556219+Copilot@users.noreply.github.com>'
            git push
          fi
