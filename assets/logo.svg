<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A51C30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="120" rx="20" ry="20" fill="url(#bgGrad)" />

  <!-- ── Icon group ── -->
  <g transform="translate(80,60)">
    
    <!-- Plate -->
    <circle cx="0" cy="0" r="46" fill="#C8B89A" filter="url(#shadow)" />
    <circle cx="0" cy="0" r="44" fill="url(#plateGrad)" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#D4AF7A" stroke-width="2" opacity="0.5" />

    <!-- Fork (left) -->
    <g transform="translate(-28, 0)">
      <!-- Handle -->
      <rect x="-2" y="-10" width="4" height="34" rx="2" fill="#D4AF7A" />
      <!-- Neck -->
      <rect x="-1" y="-18" width="2" height="10" fill="#D4AF7A" />
      <!-- Base of tines -->
      <path d="M-6,-18 L6,-18 L4,-24 L-4,-24 Z" fill="#D4AF7A" />
      <!-- Tines -->
      <rect x="-6" y="-36" width="2" height="14" rx="1" fill="#D4AF7A" />
      <rect x="-2" y="-36" width="2" height="14" rx="1" fill="#D4AF7A" />
      <rect x="2" y="-36" width="2" height="14" rx="1" fill="#D4AF7A" />
    </g>

    <!-- Knife (right) -->
    <g transform="translate(28, 0)">
      <!-- Handle -->
      <rect x="-2" y="-10" width="4" height="34" rx="2" fill="#D4AF7A" />
      <!-- Blade -->
      <path d="M-1,-36 L2,-36 L3,-10 L-2,-10 Z" fill="#E8DFD0" />
      <!-- Blade edge -->
      <line x1="2" y1="-36" x2="3" y2="-10" stroke="#C8B89A" stroke-width="1" />
    </g>

    <!-- Graduation cap -->
    <g transform="translate(0, -4)">
      <!-- Tassel -->
      <path d="M0,-2 Q10,0 15,8" fill="none" stroke="#FFD700" stroke-width="1.5" />
      <circle cx="15" cy="8" r="2" fill="#FFD700" />
      
      <!-- Base -->
      <path d="M-12,0 L12,0 L8,10 L-8,10 Z" fill="#7B1020" />
      
      <!-- Top Board -->
      <polygon points="0,-14 20,0 0,9 -20,0" fill="#A51C30" stroke="#7B1020" stroke-width="1" />
      
      <!-- Button -->
      <circle cx="0" cy="-2" r="2.5" fill="#FFD700" />
    </g>
  </g>

  <!-- ── Text ── -->
  <g transform="translate(150, 65)">
    <!-- Main Title -->
    <text
      x="0" y="0"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="44"
      font-weight="bold"
      letter-spacing="-0.5"
    >
      <tspan fill="#FFFFFF">Crimson </tspan>
      <tspan fill="#FFD700">Eats</tspan>
    </text>

    <!-- Subtitle / Tagline -->
    <text
      x="4" y="32"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-size="13"
      font-weight="600"
      fill="#FFCACA"
      letter-spacing="4"
    >FREE FOOD · HARVARD</text>
  </g>
</svg>