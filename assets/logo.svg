<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A51C30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="160" rx="18" ry="18" fill="url(#bgGrad)" />

  <!-- ── Icon group (fork · plate · cap) centred at x=80 ── -->
  <g transform="translate(80,80)">

    <!-- Plate shadow -->
    <ellipse cx="0" cy="44" rx="38" ry="6" fill="#00000033" />

    <!-- Plate -->
    <ellipse cx="0" cy="38" rx="38" ry="9" fill="#C8B89A" />
    <ellipse cx="0" cy="36" rx="36" ry="36" fill="url(#plateGrad)" />
    <ellipse cx="0" cy="36" rx="36" ry="36" fill="none" stroke="#C8B89A" stroke-width="2" />

    <!-- Graduation cap on the plate -->
    <!-- Board (tilted square) -->
    <g transform="translate(0,28)">
      <polygon points="0,-14 16,0 0,14 -16,0" fill="#A51C30" />
      <!-- Top button -->
      <circle cx="0" cy="-14" r="3" fill="#FFD700" />
      <!-- Tassel string -->
      <line x1="0" y1="-14" x2="12" y2="-6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="-4" r="2.5" fill="#FFD700" />
      <!-- Cap brim -->
      <rect x="-20" y="-4" width="40" height="7" rx="3" ry="3" fill="#7B1020" />
    </g>

    <!-- Fork (left of plate) -->
    <g transform="translate(-52,36)">
      <!-- Handle -->
      <rect x="-3" y="4" width="6" height="26" rx="3" fill="#D4AF7A" />
      <!-- Neck -->
      <rect x="-2" y="-6" width="4" height="14" rx="2" fill="#D4AF7A" />
      <!-- Tines -->
      <rect x="-5" y="-24" width="2" height="20" rx="1" fill="#D4AF7A" />
      <rect x="-1.5" y="-24" width="2" height="20" rx="1" fill="#D4AF7A" />
      <rect x="2" y="-24" width="2" height="20" rx="1" fill="#D4AF7A" />
    </g>

    <!-- Knife (right of plate) -->
    <g transform="translate(52,36)">
      <!-- Handle -->
      <rect x="-3" y="4" width="6" height="26" rx="3" fill="#D4AF7A" />
      <!-- Blade -->
      <path d="M -2,-24 L 2,-24 L 3,4 L -2,4 Z" rx="1" fill="#C0C0C0" />
      <!-- Blade edge -->
      <line x1="2" y1="-24" x2="3" y2="4" stroke="#A0A0A0" stroke-width="0.5" />
    </g>
  </g>

  <!-- ── Text ── -->
  <!-- "Crimson" -->
  <text
    x="168" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="bold"
    letter-spacing="-1"
    fill="#FFFFFF"
  >Crimson</text>

  <!-- "Eats" in gold -->
  <text
    x="168" y="130"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="bold"
    letter-spacing="6"
    fill="#FFD700"
  >Eats</text>

  <!-- Tagline -->
  <text
    x="338" y="130"
    font-family="Arial, sans-serif"
    font-size="11"
    fill="#FFCACA"
    letter-spacing="0.5"
  >FREE FOOD · HARVARD</text>
</svg>
